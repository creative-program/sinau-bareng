<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinau Bareng - Kuis Online</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Firebase state for Babel script
        window.fbCore = { initializeApp };
        window.fbAuth = { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
        window.fbDb = { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .touch-none { touch-action: none; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Helper to get environment variables safely
        const getEnv = (key, fallback) => {
            try {
                if (key === 'config') return typeof __firebase_config !== 'undefined' ? (typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config) : null;
                if (key === 'appId') return typeof __app_id !== 'undefined' ? __app_id : 'sinau-bareng-pid';
                if (key === 'token') return typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
            } catch (e) { return null; }
            return fallback;
        };

        const config = getEnv('config', null);
        const appId = getEnv('appId', 'default-app');
        const authToken = getEnv('token', null);

        // SVG Icons managed by React to prevent "removeChild" errors
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                user: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                'arrow-right': <><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>,
                timer: <><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></>,
                medal: <><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><circle cx="12" cy="12" r="3"/><path d="M11 12 8.5 19 12 21l3.5-2L13 12"/></>,
                'chevron-right': <><path d="m9 18 6-6-6-6"/></>,
                lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
                'help-circle': <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></>,
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const PIDIcon = ({ size = 64 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="1.5" ry="1.5" />
                <line x1="9" y1="21" x2="15" y2="21" />
                <line x1="12" y1="17" x2="12" y2="21" />
                <path d="M7 8h10" /><path d="M7 12h5" /><circle cx="16.5" cy="12" r="0.5" fill="currentColor" />
            </svg>
        );

        const questions = [
            { question: "Sistem operasi apakah yang umumnya menjadi dasar pengoperasian Papan Interaktif Digital modern?", options: ["Windows", "Android", "Linux", "macOS"], answer: 1, rationale: "Android dipilih karena fleksibel, mendukung banyak aplikasi edukasi, dan sangat optimal untuk navigasi layar sentuh." },
            { question: "Komponen perangkat keras manakah yang digunakan untuk menulis secara presisi pada layar?", options: ["Speaker", "Kamera", "Pena Digital (Stylus)", "Port HDMI"], answer: 2, rationale: "Pena digital dirancang khusus untuk presisi saat menulis dan menggambar." },
            { question: "Fitur apa yang memungkinkan banyak murid berinteraksi di layar secara bersamaan?", options: ["Single Touch", "Kolaborasi Multi-user", "Screenshare", "Video Konferensi"], answer: 1, rationale: "Fitur Multi-user memungkinkan beberapa titik sentuh dideteksi sekaligus." },
            { question: "Port mana yang digunakan untuk menghubungkan laptop agar mengirim sinyal video dan audio digital?", options: ["USB 2.0", "HDMI", "Bluetooth", "VGA Tanpa Audio"], answer: 1, rationale: "HDMI adalah standar utama untuk transfer video dan audio berkualitas tinggi." },
            { question: "Apa manfaat utama visualisasi konsep dalam pembelajaran menggunakan papan interaktif?", options: ["Mengurangi listrik", "Mempermudah pemahaman materi kompleks", "Mempercepat jam istirahat", "Menggantikan peran guru"], answer: 1, rationale: "Simulasi visual membantu siswa memahami konsep abstrak." },
            { question: "Bagaimana cara terbaik menyimpan hasil diskusi di papan tulis digital?", options: ["Fitur Manajemen File (Save)", "Memotret dengan HP", "Menghapus layar", "Mematikan listrik paksa"], answer: 0, rationale: "Fitur 'Save' internal memungkinkan penyimpanan digital yang rapi." },
            { question: "Mengapa penjadwalan pemakaian papan interaktif sangat penting?", options: ["Agar terlihat sibuk", "Agar tagihan internet turun", "Menghindari penggunaan berlebihan (overused)", "Membatasi akses murid"], answer: 2, rationale: "Penjadwalan menjaga umur pakai perangkat keras." },
            { question: "Kain jenis apa yang paling aman untuk membersihkan layar tanpa goresan?", options: ["Kertas Tisu", "Kain Microfiber", "Kain Katun Kasar", "Spons Dapur"], answer: 1, rationale: "Kain Microfiber mengangkat debu tanpa merusak lapisan pelindung." },
            { question: "Apa fungsi dari fitur pengunci keamanan (Security Lock)?", options: ["Mencegah layar pecah", "Mempercepat WiFi", "Mengelola akses dan mencegah perubahan setelan", "Menghapus virus"], answer: 2, rationale: "Mencegah perubahan settingan sistem oleh orang yang tidak berwenang." },
            { question: "Tindakan mana yang mencerminkan perawatan fisik port HDMI/USB yang benar?", options: ["Mencolok kabel dengan paksa", "Memasukkan kabel secara perlahan dan benar", "Membersihkan dengan logam tajam", "Membiarkan kabel menggantung berat"], answer: 1, rationale: "Pemasangan kabel yang hati-hati menjaga pin konektor tetap utuh." }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [isStarted, setIsStarted] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [timeLeft, setTimeLeft] = useState(20);
            const [globalLeaderboard, setGlobalLeaderboard] = useState([]);

            // Rule 3: Auth First
            useEffect(() => {
                const initAuth = async () => {
                    if (!window.fbCore || !config) return;
                    try {
                        const appInstance = window.fbCore.initializeApp(config);
                        const authInstance = window.fbAuth.getAuth(appInstance);
                        
                        if (authToken) {
                            await window.fbAuth.signInWithCustomToken(authInstance, authToken);
                        } else {
                            await window.fbAuth.signInAnonymously(authInstance);
                        }
                        
                        window.fbAuth.onAuthStateChanged(authInstance, setUser);
                    } catch (e) { console.error("Auth init failed:", e); }
                };
                initAuth();
            }, []);

            // Rule 1 & 2: Firestore Listen & Local Sort
            useEffect(() => {
                if (!user) return;
                const dbInstance = window.fbDb.getFirestore();
                const lbCol = window.fbDb.collection(dbInstance, 'artifacts', appId, 'public', 'data', 'leaderboard');
                
                const unsubscribe = window.fbDb.onSnapshot(lbCol, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const sorted = data.sort((a, b) => b.score - a.score || (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                    setGlobalLeaderboard(sorted);
                }, (error) => console.error("Firestore error:", error));

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (isStarted && !showResult && !isAnswered && timeLeft > 0) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (timeLeft === 0 && !isAnswered) {
                    handleAnswer(-1); 
                }
            }, [isStarted, showResult, isAnswered, timeLeft]);

            const handleStart = (e) => {
                e.preventDefault();
                if (userName.trim()) setIsStarted(true);
            };

            const handleAnswer = (index) => {
                if (isAnswered) return;
                setSelectedOption(index);
                setIsAnswered(true);
                if (index === questions[currentQuestion].answer) setScore(prev => prev + 1);
            };

            const saveResult = async () => {
                if (!user) return;
                try {
                    const dbInstance = window.fbDb.getFirestore();
                    const lbCol = window.fbDb.collection(dbInstance, 'artifacts', appId, 'public', 'data', 'leaderboard');
                    await window.fbDb.addDoc(lbCol, {
                        name: userName,
                        score: score,
                        timestamp: window.fbDb.serverTimestamp(),
                        userId: user.uid
                    });
                } catch (err) { console.error("Save failed:", err); }
            };

            const nextQuestion = async () => {
                if (currentQuestion < questions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    setSelectedOption(null);
                    setIsAnswered(false);
                    setTimeLeft(20);
                } else {
                    await saveResult();
                    setShowResult(true);
                }
            };

            const AppFooter = () => (
                <div className="mt-12 py-6 text-center border-t border-slate-200/50">
                    <p className="text-black text-[10px] sm:text-[11px] md:text-[12px] font-semibold tracking-wide whitespace-nowrap overflow-hidden">
                        Kuis Edukatif ini dibuat oleh Tumin Hadiwijoyo
                    </p>
                </div>
            );

            if (!isStarted) {
                return (
                    <div className="min-h-screen bg-[#0f172a] flex items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-indigo-600/20 blur-[100px] rounded-full"></div>
                        <div className="glass rounded-[2.5rem] shadow-2xl p-8 md:p-12 max-w-md w-full text-center space-y-10 relative z-10 border border-white/20 animate-in">
                            <div className="flex justify-center">
                                <div className="bg-blue-600 p-6 rounded-[2rem] text-white shadow-xl shadow-blue-500/20">
                                    <PIDIcon size={70} />
                                </div>
                            </div>
                            <div className="space-y-3">
                                <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">Sinau Bareng</h1>
                                <p className="text-blue-600 font-semibold italic text-sm sm:text-base whitespace-nowrap">
                                    Uji wawasan tentang Papan Interaktif Digital
                                </p>
                            </div>
                            <form onSubmit={handleStart} className="space-y-6 text-left">
                                <div className="space-y-2">
                                    <label className="text-xs font-extrabold text-black uppercase tracking-widest ml-1">Identitas Peserta</label>
                                    <div className="relative">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="user" size={20} /></div>
                                        <input
                                            type="text"
                                            placeholder="Tulis Nama Anda"
                                            className="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all text-lg font-bold text-slate-800"
                                            value={userName}
                                            onChange={(e) => setUserName(e.target.value)}
                                            required
                                        />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-2xl font-extrabold text-lg shadow-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                                    Mulai Sesi Kuis <Icon name="arrow-right" size={22} />
                                </button>
                            </form>
                            <AppFooter />
                        </div>
                    </div>
                );
            }

            if (showResult) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
                        <div className="glass rounded-[3.5rem] shadow-2xl p-10 md:p-12 max-w-5xl w-full space-y-10 border border-slate-100 animate-in">
                            <div className="flex flex-col lg:flex-row gap-10">
                                <div className="lg:w-1/2 text-center space-y-8">
                                    <Icon name="trophy" size={120} className="mx-auto text-yellow-400" />
                                    <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight leading-tight">Luar Biasa, {userName}!</h2>
                                    <div className="flex gap-4 justify-center">
                                        <div className="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl flex-1">
                                            <span className="block text-4xl font-extrabold">{score}/{questions.length}</span>
                                            <span className="text-[10px] uppercase font-extrabold opacity-70 tracking-widest">Skor</span>
                                        </div>
                                        <div className="bg-white border-2 border-slate-100 p-6 rounded-[2.5rem] flex-1">
                                            <span className="block text-4xl font-extrabold text-blue-600">{Math.round((score / questions.length) * 100)}%</span>
                                            <span className="text-[10px] uppercase font-extrabold text-slate-400 tracking-widest">Akurasi</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:w-1/2 bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden flex flex-col h-[500px]">
                                    <div className="flex items-center justify-between mb-6">
                                        <h3 className="text-xl font-extrabold flex items-center gap-2">
                                            <Icon name="users" className="text-blue-400" /> Peringkat Global
                                        </h3>
                                        <span className="bg-blue-600 text-[10px] px-3 py-1 rounded-full font-black uppercase">LIVE</span>
                                    </div>
                                    <div className="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-grow">
                                        {globalLeaderboard.map((entry, idx) => (
                                            <div key={entry.id} className={`flex justify-between items-center p-4 rounded-2xl border ${entry.userId === user?.uid ? 'bg-blue-600/20 border-blue-500 scale-[1.02]' : 'bg-white/5 border-white/5'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black ${idx === 0 ? 'bg-yellow-400 text-black' : idx === 1 ? 'bg-slate-300 text-black' : idx === 2 ? 'bg-amber-600 text-white' : 'bg-slate-700 text-white'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <span className="font-bold truncate max-w-[150px]">{entry.name}</span>
                                                    {entry.userId === user?.uid && <span className="text-[9px] bg-white text-blue-900 px-2 py-0.5 rounded font-black uppercase">Anda</span>}
                                                </div>
                                                <span className="font-black text-blue-400 text-xl">{entry.score}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <p className="text-[10px] text-slate-500 mt-4 text-center uppercase tracking-widest font-black italic">Daftar seluruh peserta kuis online</p>
                                </div>
                            </div>
                            <AppFooter />
                        </div>
                    </div>
                );
            }

            const q = questions[currentQuestion];
            return (
                <div className="min-h-screen bg-[#f8fafc] p-4 md:p-12 flex flex-col items-center">
                    <div className="max-w-4xl w-full space-y-8 flex-grow animate-in">
                        <div className="glass p-6 rounded-[2rem] shadow-sm border border-slate-200/50 flex justify-between items-center sticky top-4 z-20">
                            <div className="flex items-center gap-5">
                                <div className="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center font-extrabold text-2xl shadow-lg">{currentQuestion + 1}</div>
                                <div className="hidden sm:block">
                                    <p className="text-[11px] text-slate-400 font-extrabold uppercase tracking-[0.2em] mb-1">{userName}</p>
                                    <div className="flex gap-2">
                                        {questions.map((_, i) => (
                                            <div key={i} className={`h-2.5 rounded-full transition-all duration-700 ${i < currentQuestion ? 'bg-blue-600 w-4' : i === currentQuestion ? 'bg-blue-300 w-8 animate-pulse' : 'bg-slate-200 w-4'}`} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className={`flex items-center gap-3 px-6 py-3 rounded-2xl font-mono font-extrabold text-xl ${timeLeft < 6 ? 'bg-red-500 text-white animate-pulse' : 'bg-slate-900 text-white'}`}>
                                <Icon name="timer" size={22} /> {timeLeft}s
                            </div>
                        </div>
                        <div className="bg-white p-8 md:p-16 rounded-[3.5rem] shadow-xl border border-slate-100 space-y-12 min-h-[500px] flex flex-col justify-center relative animate-in">
                            <h3 className="text-2xl md:text-4xl font-extrabold text-slate-900 leading-[1.3] tracking-tight text-center md:text-left">{q?.question}</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {q?.options.map((option, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => handleAnswer(idx)}
                                        disabled={isAnswered}
                                        className={`w-full p-6 rounded-3xl text-left font-bold text-lg transition-all flex items-center gap-5 border-2 ${
                                            isAnswered 
                                                ? (idx === q.answer ? 'border-green-500 bg-green-50 text-green-800' : idx === selectedOption ? 'border-red-500 bg-red-50 text-red-800' : 'opacity-40 border-slate-100')
                                                : 'border-slate-100 bg-slate-50 hover:border-blue-300 hover:bg-white'
                                        }`}
                                    >
                                        <span className={`w-12 h-12 rounded-2xl flex items-center justify-center font-extrabold shrink-0 border-2 ${isAnswered && idx === q.answer ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-slate-200 text-slate-400'}`}>
                                            {String.fromCharCode(65 + idx)}
                                        </span>
                                        <span className="leading-tight">{option}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="min-h-[100px]">
                                {isAnswered && (
                                    <div className={`animate-in p-8 rounded-[2.5rem] flex gap-6 ${selectedOption === q.answer ? 'bg-blue-600 text-white' : 'bg-slate-900 text-white'}`}>
                                        <div className="bg-white/20 p-4 rounded-2xl h-fit"><Icon name={selectedOption === q.answer ? "lightbulb" : "help-circle"} size={32} /></div>
                                        <div>
                                            <p className="font-extrabold text-xl mb-2">{selectedOption === q.answer ? 'Insight Edukatif' : 'Coba Lagi Nanti'}</p>
                                            <p className="opacity-90 leading-relaxed font-semibold text-lg">{selectedOption === q.answer ? q.rationale : 'Tetap semangat! Periksa kembali jawabanmu untuk belajar dari kesalahan.'}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex justify-end pt-4">
                            {isAnswered && (
                                <button
                                    onClick={nextQuestion}
                                    className="bg-blue-600 text-white px-12 py-5 rounded-3xl font-extrabold text-xl shadow-2xl hover:bg-blue-700 transition-all flex items-center gap-4"
                                >
                                    {currentQuestion === questions.length - 1 ? "Selesai & Simpan" : "Lanjut"} <Icon name="chevron-right" size={28} />
                                </button>
                            )}
                        </div>
                    </div>
                    <div className="w-full max-w-4xl"><AppFooter /></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
